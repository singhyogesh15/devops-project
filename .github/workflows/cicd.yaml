name: Simple CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

# -------------------------
# 1. BUILD IMAGE
# -------------------------
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-web-app:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/my-web-app:latest

# -------------------------
# 2. DEPLOY TO KUBERNETES
# -------------------------
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure Kubernetes
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Deploy Application
        run: |
          kubectl set image deployment/my-web-app my-web-app=${{ secrets.DOCKER_USERNAME }}/my-web-app:latest
          kubectl rollout status deployment/my-web-app